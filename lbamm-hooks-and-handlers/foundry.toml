[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]

solc_version = "0.8.24"
evm_version = "cancun"

optimizer = true
optimizer_runs = 55_555_555
allow_internal_expect_revert = true
gas_limit = "18446744073709551615" # u64::MAX

# Ignore - SPDX, Transient, Init Code Size, Selfdestruct, Deployed Code Size
#ignored_error_codes = [1878, 2394, 3860, 5159, 5574] 
# Ignore - SPDX, Transient, payable fallback but no receive, Init Code Size, Deployed Code Size
ignored_error_codes = [1878, 2394, 3628, 3860, 5574]

allow_paths = ["../lbamm-core/", "../secure-proxy"]

[fuzz]
runs = 25
max_test_rejects = 2560000

[invariant]
runs = 50
depth = 250
fail_on_revert = false

[fmt]
sort_imports = true
number_underscore = "thousands"

[lint]
severity = ["low"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
